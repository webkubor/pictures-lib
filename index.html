<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pictures Lib</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <style>
      :root {
        color-scheme: light;
        --ink: #1c1813;
        --muted: #746b5f;
        --paper: #f4eadb;
        --panel: rgba(255, 250, 240, 0.86);
        --panel-strong: #fff8eb;
        --line: rgba(28, 24, 19, 0.16);
        --accent: #cf5b2c;
        --accent-2: #1d6a73;
        --danger: #8c1f16;
        --shadow: 0 24px 70px rgba(58, 36, 16, 0.16);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 10% 12%, rgba(207, 91, 44, 0.26), transparent 28rem),
          radial-gradient(circle at 88% 8%, rgba(29, 106, 115, 0.24), transparent 30rem),
          radial-gradient(circle at 50% 96%, rgba(130, 83, 38, 0.15), transparent 28rem),
          linear-gradient(135deg, #f9f1e6 0%, #eadcc8 48%, #f6ebd7 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.32;
        background-image: linear-gradient(rgba(28, 24, 19, 0.07) 1px, transparent 1px), linear-gradient(90deg, rgba(28, 24, 19, 0.05) 1px, transparent 1px);
        background-size: 32px 32px;
        mask-image: linear-gradient(to bottom, #000, transparent 75%);
      }

      header {
        position: sticky;
        top: 0;
        z-index: 10;
        backdrop-filter: blur(18px);
        background: rgba(244, 234, 219, 0.78);
        border-bottom: 1px solid var(--line);
      }

      .shell { width: min(1440px, calc(100vw - 32px)); margin: 0 auto; }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 24px;
        align-items: end;
        padding: 30px 0 22px;
      }

      .brand-row {
        display: inline-flex;
        align-items: center;
        gap: 12px;
      }

      .brandmark {
        display: grid;
        width: clamp(46px, 5vw, 62px);
        aspect-ratio: 1;
        place-items: center;
        border: 1px solid rgba(28, 24, 19, 0.2);
        border-radius: 19px;
        color: var(--paper);
        background: var(--ink);
        box-shadow: 0 18px 38px rgba(58, 36, 16, 0.18);
      }

      h1 {
        margin: 0;
        font-family: Georgia, "Songti SC", serif;
        font-size: clamp(42px, 7vw, 92px);
        line-height: 0.9;
        letter-spacing: -0.06em;
      }

      .subtitle { margin: 14px 0 0; color: var(--muted); max-width: 760px; }

      .stats { display: grid; grid-template-columns: repeat(4, minmax(110px, 1fr)); gap: 10px; }

      .stat {
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--panel);
        box-shadow: 0 12px 30px rgba(58, 36, 16, 0.08);
      }

      .stat strong { display: block; font-size: 26px; line-height: 1; }
      .stat span { display: block; margin-top: 6px; color: var(--muted); font-size: 12px; }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(220px, 1fr) 160px 180px 180px 220px;
        gap: 10px;
        padding: 0 0 18px;
      }

      input, select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 12px 14px;
        color: var(--ink);
        background: rgba(255, 250, 240, 0.9);
        font: inherit;
        outline: none;
      }

      input:focus, select:focus { border-color: rgba(207, 91, 44, 0.72); box-shadow: 0 0 0 4px rgba(207, 91, 44, 0.12); }

      main { padding: 24px 0 56px; }

      .meta-line {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        color: var(--muted);
        font-size: 13px;
        margin-bottom: 16px;
      }

      .meta-pill {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 7px 10px;
        background: rgba(255, 250, 240, 0.72);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 18px;
      }

      .card {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--panel);
        box-shadow: var(--shadow);
        transform: translateY(8px);
        animation: rise 0.48s ease forwards;
      }

      .card:hover { border-color: rgba(28, 24, 19, 0.28); transform: translateY(-2px); }

      .thumb {
        display: block;
        width: 100%;
        aspect-ratio: 4 / 3;
        object-fit: contain;
        padding: 12px;
        background:
          linear-gradient(45deg, rgba(28, 24, 19, 0.04) 25%, transparent 25%, transparent 75%, rgba(28, 24, 19, 0.04) 75%),
          linear-gradient(45deg, rgba(28, 24, 19, 0.04) 25%, transparent 25%, transparent 75%, rgba(28, 24, 19, 0.04) 75%),
          linear-gradient(135deg, rgba(29, 106, 115, 0.12), rgba(207, 91, 44, 0.08));
        background-position: 0 0, 10px 10px, 0 0;
        background-size: 20px 20px, 20px 20px, auto;
      }

      .body { padding: 14px; }

      .card-head {
        display: flex;
        gap: 8px;
        align-items: center;
        justify-content: space-between;
      }

      .source { display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; padding: 5px 9px; font-size: 12px; color: #fff; background: var(--accent); }
      .source.r2 { background: var(--accent-2); }

      .time-badge {
        color: var(--muted);
        font-size: 11px;
        white-space: nowrap;
      }

      .name { margin: 12px 0 10px; font-size: 13px; line-height: 1.35; word-break: break-all; }

      .info-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin: 0;
      }

      .info-grid div {
        min-width: 0;
        border: 1px solid rgba(28, 24, 19, 0.1);
        border-radius: 14px;
        padding: 8px;
        background: rgba(255, 255, 255, 0.42);
      }

      .info-grid dt {
        color: var(--muted);
        font-size: 10px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .info-grid dd {
        overflow: hidden;
        margin: 3px 0 0;
        font-size: 12px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
      .actions a, .actions button {
        flex: 1;
        min-width: 72px;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 8px 10px;
        color: var(--ink);
        background: rgba(255, 255, 255, 0.58);
        text-align: center;
        text-decoration: none;
        font: inherit;
        font-size: 12px;
        cursor: pointer;
      }

      .actions a:hover, .actions button:hover { border-color: rgba(28, 24, 19, 0.28); background: #fff9ee; }
      .actions .danger { color: var(--danger); border-color: rgba(140, 31, 22, 0.28); }
      .actions .danger:hover { background: #fff1ed; border-color: rgba(140, 31, 22, 0.46); }
      .actions button:disabled { cursor: wait; opacity: 0.68; }

      .empty {
        display: none;
        padding: 42px;
        border: 1px dashed var(--line);
        border-radius: 24px;
        text-align: center;
        color: var(--muted);
        background: var(--panel);
      }

      @keyframes rise { to { transform: translateY(0); } }

      @media (prefers-reduced-motion: reduce) {
        .card { animation: none; transform: none; }
      }

      @media (max-width: 760px) {
        .hero { grid-template-columns: 1fr; }
        .stats { grid-template-columns: repeat(2, 1fr); }
        .toolbar { grid-template-columns: 1fr; }
        .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="shell">
        <section class="hero">
          <div>
            <div class="brand-row">
              <span class="brandmark" aria-hidden="true">
                <svg width="34" height="34" viewBox="0 0 64 64" role="img">
                  <path d="M13 42 27 25l9 10 5-6 10 13v7H13z" fill="currentColor"/>
                  <circle cx="44" cy="20" r="6" fill="#cf5b2c"/>
                </svg>
              </span>
              <h1>Pictures Lib</h1>
            </div>
            <p class="subtitle">按上传/修改时间整理你的 GitHub 与 Cloudflare R2 图床。R2 支持鉴权真删除；GitHub 只查看。时间缺失的图片会排在后面。</p>
          </div>
          <div class="stats" id="stats"></div>
        </section>
        <form class="toolbar" id="toolbar">
          <input id="search" type="search" placeholder="搜索文件名、目录、URL..." />
          <select id="source"><option value="all">全部来源</option></select>
          <select id="folder"><option value="all">全部目录</option></select>
          <select id="sort">
            <option value="newest">最新上传优先</option>
            <option value="name">文件名 A-Z</option>
            <option value="size">文件大小优先</option>
          </select>
          <input id="adminToken" type="password" placeholder="R2 删除口令" autocomplete="off" />
        </form>
      </div>
    </header>
    <main class="shell">
      <div class="meta-line" id="meta"></div>
      <section class="grid" id="grid"></section>
      <section class="empty" id="empty">没有匹配的图片。</section>
    </main>
    <script>
      const ADMIN_TOKEN_KEY = 'pictures-lib-admin-token';
      const DELETED_R2_KEY = 'pictures-lib-deleted-r2-paths';
      const state = {
        items: [],
        filtered: [],
        source: 'all',
        folder: 'all',
        query: '',
        sort: 'newest',
        r2NonImagesTotal: 0,
        adminToken: localStorage.getItem(ADMIN_TOKEN_KEY) || '',
        deletedR2Paths: readDeletedR2Paths(),
      };
      const collator = new Intl.Collator('zh-CN', { numeric: true, sensitivity: 'base' });

      const $ = (id) => document.getElementById(id);
      const formatBytes = (bytes) => {
        if (!bytes) return 'unknown size';
        if (bytes < 1024 * 1024) return `${Math.round(bytes / 1024)} KB`;
        return `${(bytes / 1024 / 1024).toFixed(2)} MB`;
      };
      const itemTime = (item) => Date.parse(item.uploadedAt || item.lastModified || '') || 0;
      const formatDate = (value) => {
        if (!value) return '时间未知';
        return new Intl.DateTimeFormat('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' }).format(new Date(value));
      };
      const formatDateTime = (value) => {
        if (!value) return '上传时间未知';
        return new Intl.DateTimeFormat('zh-CN', {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit',
        }).format(new Date(value));
      };
      const shortType = (value) => String(value || 'image/*').replace('image/', '').toUpperCase();

      function option(value, label) {
        const node = document.createElement('option');
        node.value = value;
        node.textContent = label;
        return node;
      }

      function readDeletedR2Paths() {
        try {
          return new Set(JSON.parse(localStorage.getItem(DELETED_R2_KEY) || '[]'));
        } catch {
          return new Set();
        }
      }

      function saveDeletedR2Paths() {
        localStorage.setItem(DELETED_R2_KEY, JSON.stringify([...state.deletedR2Paths]));
      }

      function renderStats() {
        const githubTotal = state.items.filter((item) => item.source === 'github').length;
        const r2Total = state.items.filter((item) => item.source === 'r2').length;
        const stats = [
          ['总图片', state.items.length],
          ['GitHub', githubTotal],
          ['R2 图片', r2Total],
          ['R2 非图片略过', state.r2NonImagesTotal],
        ];
        $('stats').replaceChildren(...stats.map(([label, value]) => {
          const node = document.createElement('div');
          node.className = 'stat';
          node.innerHTML = `<strong>${value}</strong><span>${label}</span>`;
          return node;
        }));
      }

      function setupFilters(items) {
        const sources = [...new Set(items.map((item) => item.source))].sort(collator.compare);
        $('source').append(...sources.map((source) => option(source, source === 'r2' ? 'Cloudflare R2' : 'GitHub')));
        updateFolderOptions();
      }

      function updateFolderOptions() {
        const sourceItems = state.source === 'all' ? state.items : state.items.filter((item) => item.source === state.source);
        const folders = [...new Set(sourceItems.map((item) => item.folder))].sort(collator.compare);
        $('folder').replaceChildren(option('all', '全部目录'), ...folders.map((folder) => option(folder, folder)));
        if (!folders.includes(state.folder)) state.folder = 'all';
        $('folder').value = state.folder;
      }

      function matches(item) {
        const query = state.query.trim().toLowerCase();
        if (state.source !== 'all' && item.source !== state.source) return false;
        if (state.folder !== 'all' && item.folder !== state.folder) return false;
        if (!query) return true;
        return [item.path, item.name, item.folder, item.url].some((value) => String(value || '').toLowerCase().includes(query));
      }

      function sortItems(items) {
        return [...items].sort((a, b) => {
          if (state.sort === 'name') return collator.compare(a.path, b.path);
          if (state.sort === 'size') return (b.size || 0) - (a.size || 0) || collator.compare(a.path, b.path);

          const diff = itemTime(b) - itemTime(a);
          if (diff) return diff;
          if (a.source !== b.source) return a.source.localeCompare(b.source);
          return collator.compare(a.path, b.path);
        });
      }

      function render() {
        state.filtered = sortItems(state.items.filter(matches));
        const knownTimes = state.items.filter((item) => itemTime(item)).length;
        $('meta').replaceChildren(
          metaPill(`当前显示 ${state.filtered.length} / ${state.items.length} 张`),
          metaPill(`有时间信息 ${knownTimes} 张`),
          metaPill(`快照 ${new Date(window.galleryGeneratedAt).toLocaleString()}`),
        );
        $('empty').style.display = state.filtered.length ? 'none' : 'block';
        $('grid').replaceChildren(...state.filtered.map(renderCard));
      }

      function metaPill(text) {
        const node = document.createElement('span');
        node.className = 'meta-pill';
        node.textContent = text;
        return node;
      }

      function renderCard(item, index) {
        const card = document.createElement('article');
        card.className = 'card';
        card.style.animationDelay = `${Math.min(index, 24) * 18}ms`;
        const uploadedAt = item.uploadedAt || item.lastModified;
        card.innerHTML = `
          <img class="thumb" src="${item.url}" alt="${escapeHtml(item.name)}" loading="lazy" referrerpolicy="no-referrer" />
          <div class="body">
            <div class="card-head">
              <span class="source ${item.source}">${item.source === 'r2' ? 'R2' : 'GitHub'}</span>
              <span class="time-badge">${escapeHtml(formatDate(uploadedAt))}</span>
            </div>
            <div class="name">${escapeHtml(item.path)}</div>
            <dl class="info-grid">
              <div><dt>时间</dt><dd title="${escapeHtml(formatDateTime(uploadedAt))}">${escapeHtml(formatDateTime(uploadedAt))}</dd></div>
              <div><dt>大小</dt><dd>${escapeHtml(formatBytes(item.size))}</dd></div>
              <div><dt>类型</dt><dd>${escapeHtml(shortType(item.contentType))}</dd></div>
              <div><dt>目录</dt><dd title="${escapeHtml(item.folder)}">${escapeHtml(item.folder)}</dd></div>
            </dl>
            <div class="actions">
              <a href="${item.url}" target="_blank" rel="noreferrer">打开</a>
              <button class="copy-action" type="button">复制 URL</button>
              ${item.source === 'r2' ? '<button class="danger delete-action" type="button">删除 R2</button>' : ''}
            </div>
          </div>
        `;
        const copyButton = card.querySelector('.copy-action');
        copyButton.addEventListener('click', async () => {
          await navigator.clipboard.writeText(item.url);
          copyButton.textContent = '已复制';
          setTimeout(() => { copyButton.textContent = '复制 URL'; }, 1000);
        });

        const deleteButton = card.querySelector('.delete-action');
        if (deleteButton) {
          deleteButton.addEventListener('click', () => deleteR2Item(item, deleteButton));
        }
        return card;
      }

      async function deleteR2Item(item, button) {
        const token = state.adminToken.trim();
        if (!token) {
          $('adminToken').focus();
          window.alert('先输入 R2 删除口令。');
          return;
        }

        if (!window.confirm(`确认从 R2 真删除这个源文件？\n\n${item.path}\n\n删除后不可恢复。`)) return;
        const typedPath = window.prompt('为避免误删，请输入完整 R2 路径确认：');
        if (typedPath !== item.path) {
          window.alert('路径不匹配，已取消删除。');
          return;
        }

        button.disabled = true;
        button.textContent = '删除中...';

        try {
          const response = await fetch('/api/assets/delete', {
            method: 'POST',
            headers: {
              authorization: `Bearer ${token}`,
              'content-type': 'application/json',
            },
            body: JSON.stringify({ source: item.source, path: item.path }),
          });
          const payload = await response.json().catch(() => ({}));
          if (!response.ok || !payload.ok) {
            throw new Error(payload.error || `Delete failed with HTTP ${response.status}`);
          }

          state.deletedR2Paths.add(item.path);
          saveDeletedR2Paths();
          state.items = state.items.filter((candidate) => !(candidate.source === 'r2' && candidate.path === item.path));
          updateFolderOptions();
          renderStats();
          render();
        } catch (error) {
          button.disabled = false;
          button.textContent = '删除 R2';
          window.alert(`删除失败：${error.message}`);
        }
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"]/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[char]));
      }

      async function boot() {
        const data = await fetch('./data/assets.json').then((response) => response.json());
        window.galleryGeneratedAt = data.generatedAt;
        state.r2NonImagesTotal = data.sources.r2.nonImagesTotal;
        state.items = data.items.filter((item) => !(item.source === 'r2' && state.deletedR2Paths.has(item.path)));
        $('adminToken').value = state.adminToken;
        renderStats();
        setupFilters(state.items);
        render();
      }

      $('search').addEventListener('input', (event) => { state.query = event.target.value; render(); });
      $('toolbar').addEventListener('submit', (event) => { event.preventDefault(); });
      $('source').addEventListener('change', (event) => { state.source = event.target.value; updateFolderOptions(); render(); });
      $('folder').addEventListener('change', (event) => { state.folder = event.target.value; render(); });
      $('sort').addEventListener('change', (event) => { state.sort = event.target.value; render(); });
      $('adminToken').addEventListener('input', (event) => {
        state.adminToken = event.target.value.trim();
        if (state.adminToken) localStorage.setItem(ADMIN_TOKEN_KEY, state.adminToken);
        else localStorage.removeItem(ADMIN_TOKEN_KEY);
      });

      boot().catch((error) => {
        $('meta').textContent = `加载失败：${error.message}`;
      });
    </script>
  </body>
</html>
